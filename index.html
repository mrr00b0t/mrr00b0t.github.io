<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fancy HTML Page</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background-color: #f0f0f5;
            color: #333;
        }
        .header {
            background-color: #4CAF50;
            padding: 20px;
            text-align: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 50px;
        }
        .btn {
            background-color: #008CBA;
            color: white;
            padding: 15px 32px;
            font-size: 16px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .btn:hover {
            background-color: #005f73;
        }
        .card {
            display: inline-block;
            margin: 20px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            width: 300px;
        }
        .footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px 0;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Welcome to the Fancy HTML Page</h1>
        <p>Enhancing web design with inline CSS and JS</p>
    </div>
    <div class="container">
        <div class="card">
            <h2>Card Title</h2>
            <p>Some interesting content goes here. This is a demo card with some fancy styling.</p>
            <button class="btn" onclick="showAlert()">Click Me</button>
        </div>
        <div class="card">
            <h2>Another Card</h2>
            <p>More fascinating content. You can add more cards as needed.</p>
            <button class="btn" onclick="showAlert()">Click Me</button>
        </div>
    </div>
    <div class="footer">
        <p>&copy; 2025 Fancy HTML Page. All Rights Reserved.</p>
    </div>
    <script>
        function showAlert() {
            alert('Button clicked! Thanks for visiting.');
        }
    </script>
</body>
</html>
